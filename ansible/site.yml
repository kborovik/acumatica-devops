---
# Deployment stack for the Acumatica dev/tst/prd lab + the MailPilot guest:
#   kvm        hypervisor + VM lifecycle scripts (win-vm-*, qga-exec)
#   storage    ZFS datasets
#   sanoid     snapshot schedules (daily recursive VM zvols + mssql backups)
#   network    libvirt NAT net, static DHCP leases, tailscale subnet router,
#              split-DNS dnsmasq (VM names for the tailnet)
#   fileserver SMB shares over /upool (distr, mssql-backups)
#   vm_clone   per-instance Windows VM from the golden image (zfs clone,
#              derived MAC, first-boot rename) — inventory-driven, group acu
#   linux_vm   per-instance Ubuntu VM from the cloud image (zvols + cloud-init
#              seed) — inventory-driven, group mailpilot
#   mssql      per-instance Windows layer (data disk + SQL Server), group acu
#   acumatica  Acumatica ERP: installer MSI from the distr share + IIS/ac.exe
#              instance deployment (db + site), group acu
#   tools..googleworkspace_cli  mailpilot guest config: OS tools, operator
#              CLIs, ext4 data disk + PostgreSQL 18 (postgresql role)
#   mailpilot  mailpilot-crm from PyPI + systemd service, group mailpilot
#
#   ansible-playbook site.yml [--tags <role>] [-l acu-dev1|mailpilot-1]
#
- name: Configure kronos as KVM host for Windows / Acumatica instances
  hosts: kronos
  roles:
    - { role: kvm, tags: kvm }
    - { role: storage, tags: storage }
    - { role: sanoid, tags: sanoid }
    - { role: network, tags: network }
    - { role: fileserver, tags: fileserver }
    - { role: fish_shell, tags: fish }

# no gather_facts: the guest may not exist yet — the role creates it
- name: Clone Windows guests from the golden image (per inventory)
  hosts: acu
  gather_facts: false
  roles:
    - { role: vm_clone, tags: vm }

- name: Acumatica instances — data disk + SQL Server + Acumatica installer
  hosts: acu
  gather_facts: true
  roles:
    - { role: mssql, tags: mssql }
    - { role: acumatica, tags: acumatica }

# no gather_facts: the guest may not exist yet — the role creates it
- name: Create the MailPilot Linux guest on kronos
  hosts: mailpilot
  gather_facts: false
  roles:
    - { role: linux_vm, tags: vm }

- name: Configure the MailPilot guest — OS, data disk, Postgres, operator tooling
  hosts: mailpilot
  gather_facts: true
  roles:
    - { role: tools, tags: tools }
    - { role: github_cli, tags: github_cli }
    - { role: google_cli, tags: google_cli }
    - role: gpg
      tags: gpg
      when: gpg_signing_key is defined
    - { role: tailscale, tags: tailscale }
    - { role: postgresql, tags: postgresql }
    - { role: nodejs, tags: nodejs }
    - { role: claude_code, tags: claude_code }
    - { role: firecrawl_cli, tags: firecrawl_cli }
    - { role: googleworkspace_cli, tags: googleworkspace_cli }

- name: Deploy the MailPilot application
  hosts: mailpilot
  gather_facts: true
  roles:
    - { role: mailpilot, tags: mailpilot }
