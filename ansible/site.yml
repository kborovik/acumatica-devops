---
# Deployment stack for the Acumatica dev/tst/prd lab + the MailPilot guest:
#   host_kvm        hypervisor + VM lifecycle scripts (win-vm-*, qga-exec)
#   host_storage    ZFS datasets
#   host_sanoid     snapshot schedules (daily recursive VM zvols + mssql backups)
#   host_network    libvirt NAT net, static DHCP leases, tailscale subnet router,
#                   split-DNS dnsmasq (VM names for the tailnet)
#   host_smb        SMB shares over /upool (distr, mssql-backups)
#   host_base       base host config for kb (fish shell)
#   linux_unattended_upgrades  automatic apt upgrades + auto-reboot; runs on
#                   every Linux instance (kronos here, mailpilot guests below)
#   linux_uv        uv (astral) OS-global tool; every Linux instance

#   acumatica_vm    per-instance Windows VM from the golden image (zfs clone,
#                   derived MAC, first-boot rename) — inventory-driven, group acu
#   acumatica_mssql per-instance Windows layer (data disk + SQL Server), group acu
#   acumatica_erp   Acumatica ERP: installer MSI from the distr share + IIS/ac.exe
#                   instance deployment (db + site), group acu
#   mailpilot_vm    per-instance Ubuntu VM from the cloud image (zvols + cloud-init
#                   seed) — inventory-driven, group mailpilot
#   mailpilot_tools..mailpilot_firecrawl_cli  mailpilot guest config: OS
#                   tools, operator CLIs, ext4 data disk + PostgreSQL 18
#   mailpilot_crm   mailpilot-crm from PyPI + systemd service, group mailpilot
#
#   ansible-playbook site.yml [--tags <role>] [-l acu-dev1|mailpilot-1]
#
- name: Configure kronos as KVM host for Windows / Acumatica instances
  hosts: kronos
  roles:
    - { role: host_kvm, tags: host_kvm }
    - { role: host_storage, tags: host_storage }
    - { role: host_sanoid, tags: host_sanoid }
    - { role: host_network, tags: host_network }
    - { role: host_smb, tags: host_smb }
    - { role: host_base, tags: host_base }
    - { role: linux_unattended_upgrades, tags: linux_unattended_upgrades }
    - { role: linux_uv, tags: linux_uv }

# no gather_facts: the guest may not exist yet — the role creates it
- name: Clone Windows guests from the golden image (per inventory)
  hosts: acu
  gather_facts: false
  roles:
    - { role: acumatica_vm, tags: acumatica_vm }

- name: Acumatica instances — data disk + SQL Server + Acumatica installer
  hosts: acu
  gather_facts: true
  roles:
    - { role: acumatica_mssql, tags: acumatica_mssql }
    - { role: acumatica_erp, tags: acumatica_erp }

# no gather_facts: the guest may not exist yet — the role creates it
- name: Create the MailPilot Linux guest on kronos
  hosts: mailpilot
  gather_facts: false
  roles:
    - { role: mailpilot_vm, tags: mailpilot_vm }

- name: Configure the MailPilot guest — OS, data disk, Postgres, operator tooling
  hosts: mailpilot
  gather_facts: true
  roles:
    - { role: linux_unattended_upgrades, tags: linux_unattended_upgrades }
    - { role: linux_uv, tags: linux_uv }
    - { role: mailpilot_tools, tags: mailpilot_tools }
    - { role: mailpilot_github_cli, tags: mailpilot_github_cli }
    - { role: mailpilot_google_cli, tags: mailpilot_google_cli }
    - role: mailpilot_gpg
      tags: mailpilot_gpg
      when: gpg_signing_key is defined
    - { role: mailpilot_postgresql, tags: mailpilot_postgresql }
    - { role: mailpilot_nodejs, tags: mailpilot_nodejs }
    - { role: mailpilot_claude_code, tags: mailpilot_claude_code }
    - { role: mailpilot_firecrawl_cli, tags: mailpilot_firecrawl_cli }

- name: Deploy the MailPilot application
  hosts: mailpilot
  gather_facts: true
  roles:
    - { role: mailpilot_crm, tags: mailpilot_crm }
