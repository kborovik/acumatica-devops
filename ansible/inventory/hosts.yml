all:
  hosts:
    kronos:            # resolved via ~/.ssh/config (Tailscale, user kb)
      ansible_user: kb
      ansible_become: true
  children:
    acu:               # Windows/Acumatica instance VMs — adding a host here is all it
      hosts:           # takes: the vm_clone play creates the VM from vm_ip (see docs)
        acu-dev1:
          vm_ip: 192.168.122.11
          vm_mac: '52:54:00:91:d9:72' # predates derived MACs (group_vars/acu.yml)
        # acu-tst1: { vm_ip: 192.168.122.12 }
        # acu-prd1: { vm_ip: 192.168.122.13 }
    mailpilot:         # Ubuntu guest VMs running the MailPilot stack — the linux_vm
      hosts:           # play creates the guest from vm_ip (see docs/mailpilot.md)
        mailpilot-1:
          vm_ip: 192.168.122.20
        # mailpilot-2: { vm_ip: 192.168.122.21 }
