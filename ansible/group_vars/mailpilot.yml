# Ubuntu guests on kronos, reached over the tailnet-routed VM subnet
# (192.168.122.0/24) via the SSH key cloud-init injects for the 'ubuntu' user.
#
# Each guest's identity comes from the inventory: vm_ip (required, the static
# address cloud-init assigns). The MAC is derived from vm_ip's last octet so a
# rebuilt guest keeps a stable hardware address; the derived vm_dhcp_entry
# gives the guest a <name>.vm.internal DNS record on the tailnet (the guest
# itself uses the static cloud-init address, not the lease).
vm_mac: "{{ '52:54:00:7a:00:%02x' | format(vm_ip.split('.') | last | int) }}"
vm_dhcp_entry: { name: '{{ inventory_hostname }}', mac: '{{ vm_mac }}', ip: '{{ vm_ip }}' }

ansible_host: "{{ vm_ip }}"
ansible_user: ubuntu
ansible_become: true
# Pin the system interpreter: auto-discovery can pick ubuntu's user-local python
# (~/.local/bin), which become_user tasks (postgres) can't exec under ubuntu's
# 0750 home — "Permission denied". /usr/bin/python3 is root-owned.
ansible_python_interpreter: /usr/bin/python3
# Laptop → kronos → guest LAN. Guests are not on the tailnet; kronos is the
# subnet router. ProxyJump keeps Ansible reliable from the control machine
# without depending on the advertised route approval. Interactive SSH:
# `ssh -J kronos ubuntu@{{ vm_ip }}` or `<name>.vm.internal`.
ansible_ssh_common_args: '-o ProxyJump=kronos'

# Public key(s) cloud-init installs for 'ubuntu'. Ansible then connects with the
# matching private key (default SSH key / agent, or set
# ansible_ssh_private_key_file). Resolved on the control machine at play time.
vm_admin_ssh_key_file: '~/.ssh/id_ed25519.pub'
