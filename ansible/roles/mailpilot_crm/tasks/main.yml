---
- name: Assert mailpilot_version is set
  ansible.builtin.assert:
    that:
      - mailpilot_version | length > 0
    fail_msg: "mailpilot_version must be set (e.g. --extra-vars 'mailpilot_version=0.18.0')"

# uv is the OS-global tool from the linux_uv role ({{ uv_install_dir }}/uv); the
# python/tool installs run as the app user so they land in that user's env
# ({{ mailpilot_home }}/.local/share/uv + .local/bin). No dedicated service
# account — mailpilot_user is the interactive login (ubuntu by default).
- name: Install Python {{ uv_python_version }} via uv
  ansible.builtin.command:
    cmd: '{{ uv_install_dir }}/uv python install {{ uv_python_version }}'
  become: true
  become_user: '{{ mailpilot_user }}'
  register: uv_python_install
  changed_when: "'Installed' in uv_python_install.stderr"

- name: Install mailpilot v{{ mailpilot_version }} from PyPI
  ansible.builtin.command:
    cmd: >-
      {{ uv_install_dir }}/uv tool install
      --python {{ uv_python_version }}
      --upgrade
      {{ mailpilot_package }}=={{ mailpilot_version }}
  become: true
  become_user: '{{ mailpilot_user }}'
  register: mailpilot_install
  changed_when: "'Installed' in mailpilot_install.stderr or 'Updated' in mailpilot_install.stderr"

- name: Verify mailpilot installation
  ansible.builtin.command:
    cmd: '{{ mailpilot_home }}/.local/bin/mailpilot --version'
  become: true
  become_user: '{{ mailpilot_user }}'
  register: mailpilot_version_check
  changed_when: false

- name: Display mailpilot version
  ansible.builtin.debug:
    msg: 'mailpilot version: {{ mailpilot_version_check.stdout }}'

# Symlink so systemd and non-login shells find the CLI without relying on
# ~/.local/bin being on PATH.
- name: Add mailpilot to system PATH
  ansible.builtin.file:
    src: '{{ mailpilot_home }}/.local/bin/mailpilot'
    dest: /usr/local/bin/mailpilot
    state: link
    force: true

- name: Ensure PostgreSQL cluster is started
  ansible.builtin.command:
    cmd: /usr/bin/pg_ctlcluster 18 main start
  register: pg_start
  changed_when: pg_start.rc == 0 and 'already running' not in (pg_start.stderr | default(''))
  failed_when: pg_start.rc != 0 and 'already running' not in (pg_start.stderr | default(''))

- name: Check if {{ mailpilot_user }} PostgreSQL role exists
  ansible.builtin.command:
    cmd: psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='{{ mailpilot_user }}'" postgres
  become: true
  become_user: postgres
  register: mailpilot_pg_role_check
  changed_when: false

- name: Create {{ mailpilot_user }} PostgreSQL role if missing
  ansible.builtin.command:
    cmd: psql -c "CREATE ROLE {{ mailpilot_user }} WITH LOGIN CREATEDB"
  become: true
  become_user: postgres
  when: mailpilot_pg_role_check.stdout != '1'

- name: Check if mailpilot database exists
  ansible.builtin.command:
    cmd: psql -tAc "SELECT 1 FROM pg_database WHERE datname='mailpilot'" postgres
  become: true
  become_user: postgres
  register: mailpilot_pg_db_check
  changed_when: false

- name: Create mailpilot database if missing
  ansible.builtin.command:
    cmd: createdb -O {{ mailpilot_user }} mailpilot
  become: true
  become_user: postgres
  when: mailpilot_pg_db_check.stdout != '1'

- name: Check mailpilot database owner
  ansible.builtin.command:
    cmd: >-
      psql -tAc
      "SELECT pg_catalog.pg_get_userbyid(datdba) FROM pg_database WHERE datname='mailpilot'"
  become: true
  become_user: postgres
  register: mailpilot_db_owner_check
  changed_when: false
  when: mailpilot_pg_db_check.stdout == '1'

- name: Ensure mailpilot database owner is {{ mailpilot_user }}
  ansible.builtin.command:
    cmd: psql -c "ALTER DATABASE mailpilot OWNER TO {{ mailpilot_user }}"
  become: true
  become_user: postgres
  when:
    - mailpilot_pg_db_check.stdout == '1'
    - mailpilot_db_owner_check.stdout != mailpilot_user

- name: Check public schema owner in mailpilot database
  ansible.builtin.command:
    cmd: psql -tAc "SELECT nspowner::regrole FROM pg_namespace WHERE nspname='public'" mailpilot
  become: true
  become_user: postgres
  register: public_schema_owner
  changed_when: false

# Migrate objects from a prior dedicated service role (e.g. "mailpilot") so the
# interactive user owns the schema after a re-point of mailpilot_user.
# Skip predefined roles: PG15+ owns public as pg_database_owner, and REASSIGN
# OWNED BY that role fails ("required by the database system").
- name: Reassign objects from prior public-schema owner to {{ mailpilot_user }}
  ansible.builtin.command:
    cmd: >-
      psql -d mailpilot -c
      "REASSIGN OWNED BY {{ public_schema_owner.stdout }} TO {{ mailpilot_user }}"
  become: true
  become_user: postgres
  when:
    - public_schema_owner.stdout | length > 0
    - public_schema_owner.stdout != mailpilot_user
    - not public_schema_owner.stdout.startswith('pg_')

- name: Grant {{ mailpilot_user }} ownership of public schema in mailpilot database
  ansible.builtin.command:
    cmd: psql -d mailpilot -c "ALTER SCHEMA public OWNER TO {{ mailpilot_user }}"
  become: true
  become_user: postgres
  when: public_schema_owner.stdout != mailpilot_user

- name: Initialize database schema
  ansible.builtin.command:
    cmd: '{{ mailpilot_home }}/.local/bin/mailpilot status'
  become: true
  become_user: '{{ mailpilot_user }}'
  changed_when: false

# Off-GCP: drop the service-account JSON, point ADC + mailpilot config at it.
- name: Ensure gcloud config directory for application credentials
  ansible.builtin.file:
    path: '{{ mailpilot_home }}/.config/gcloud'
    state: directory
    owner: '{{ mailpilot_user }}'
    group: '{{ mailpilot_group }}'
    mode: '0700'
  when: google_application_credentials_b64 | length > 0

- name: Install Google application credentials (service account JSON)
  ansible.builtin.copy:
    content: '{{ google_application_credentials_b64 | b64decode }}'
    dest: '{{ google_application_credentials_path }}'
    owner: '{{ mailpilot_user }}'
    group: '{{ mailpilot_group }}'
    mode: '0600'
  no_log: true
  when: google_application_credentials_b64 | length > 0
  notify: Restart mailpilot

- name: Point mailpilot config at Google application credentials
  ansible.builtin.command:
    cmd: >-
      {{ mailpilot_home }}/.local/bin/mailpilot config set
      google_application_credentials
      {{ google_application_credentials_path }}
  become: true
  become_user: '{{ mailpilot_user }}'
  register: mailpilot_gac_config
  changed_when: true
  when: google_application_credentials_b64 | length > 0
  notify: Restart mailpilot

- name: Install mailpilot systemd unit
  ansible.builtin.template:
    src: mailpilot.service.j2
    dest: /etc/systemd/system/mailpilot.service
    owner: root
    group: root
    mode: '0644'
  notify: Restart mailpilot

- name: Enable and start mailpilot service
  ansible.builtin.systemd:
    name: mailpilot.service
    state: started
    enabled: true
    daemon_reload: true
