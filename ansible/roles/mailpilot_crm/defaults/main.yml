---
# Version is required — pass it explicitly (make deploy version=X.Y.Z) or let the
# Makefile resolve the latest PyPI release.
mailpilot_version: ''

# PyPI distribution name. The import package and CLI command stay "mailpilot".
mailpilot_package: mailpilot-crm

# Run the daemon and CLI as the interactive guest login (cloud-init 'ubuntu').
# Home holds the uv tool install and runtime config (~/.mailpilot/config.json).
# The matching PostgreSQL role uses peer/localhost trust under that username;
# the database name stays "mailpilot".
mailpilot_user: ubuntu
mailpilot_group: ubuntu
mailpilot_home: /home/ubuntu

# GCP service-account JSON for workload outside Google Cloud (ADC / Pub/Sub).
# Makefile loads pass …/GOOGLE_APPLICATION_CREDENTIALS as base64 into
# google_application_credentials_b64; empty skips deploy of the file.
google_application_credentials_b64: ''
google_application_credentials_path: '{{ mailpilot_home }}/.config/gcloud/application_default_credentials.json'

uv_python_version: '3.14'
