---
# Guest sizing. The OS zvol is written from the Ubuntu cloud image (~3.5 GiB
# virtual) and grown to vm_os_disk_size by cloud-init on first boot. The data
# zvol becomes the guest's ext4 data disk for PostgreSQL (see the mailpilot_postgresql role).
vm_os_disk_size: 40G
vm_data_disk_size: 40G
vm_memory_mb: 8192
vm_vcpus: 4
# libvirt hardware-profile hint only (virtio models etc.), independent of the
# guest OS which comes from the cloud image. virt-install rejects an explicit
# osinfo name its libosinfo-db doesn't know (even with require=off), and kronos's
# db predates 26.04 — so use the ubuntu-lts-latest alias, which always resolves
# to the newest Ubuntu LTS profile the db knows (and tracks 26.04 once added).
vm_osinfo: ubuntu-lts-latest

# Extra SSH public keys to install for the guest 'ubuntu' user, in addition to
# vm_admin_ssh_key_file (group_vars/mailpilot.yml). Each entry is a full key line.
vm_admin_ssh_keys: []
