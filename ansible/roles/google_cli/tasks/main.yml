---
# Google serves this key ASCII-armored (despite the .gpg URL). apt's deb822
# Signed-By treats a .gpg keyring as binary and rejects armored content
# ("unsupported filetype"), so store it as .asc — same as the postgres/node roles.
- name: Import Google GPG Key
  ansible.builtin.get_url:
    url: https://packages.cloud.google.com/apt/doc/apt-key.gpg
    dest: /etc/apt/keyrings/google-cloud.asc
    mode: '0644'

- name: Add Google Apt Repository
  ansible.builtin.deb822_repository:
    name: google-cloud-sdk
    types: [deb]
    uris: https://packages.cloud.google.com/apt
    suites: [cloud-sdk]
    components: [main]
    architectures: [amd64]
    signed_by: /etc/apt/keyrings/google-cloud.asc
    state: present

- name: Install Google Cloud CLI
  ansible.builtin.apt:
    package: [google-cloud-cli]
    update_cache: true
    state: present
