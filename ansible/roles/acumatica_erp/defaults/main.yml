---
# --- installer (tasks/install.yml) --------------------------------------------
# Acumatica ERP installer MSI, staged manually on the distr share
# (public builds: http://acumatica-builds.s3.amazonaws.com — no registration).
# The MSI lays down the Configuration Wizard + ac.exe under
# C:\Program Files\Acumatica ERP <version>.
acumatica_version: 26.101.0225
acumatica_msi: "{{ distr_mount }}/installers/AcumaticaERPInstall-{{ acumatica_version }}.msi"

# How the guest reaches the installer: distr SMB share, svc-distr credential
# generated by the host_smb role (root-only on kronos). libvirt's dnsmasq
# resolves `kronos` in the guests; override with \\192.168.122.1\distr if not.
acumatica_distr_unc: \\kronos\distr
acumatica_smb_password_file: /root/svc-distr.smbpasswd

# --- application instance (tasks/instance.yml) ---------------------------------
# Deployed with ac.exe (laid down by the MSI above). One instance per VM:
# database on the local SQL Server, IIS site under Default Web Site →
# http://<vm-ip>/{{ acumatica_instance_name }}.
acumatica_instance_name: AcumaticaERP
acumatica_db_name: AcumaticaDB # matches the backup examples in docs/windows-vms.md
acumatica_instance_path: C:\Acumatica\{{ acumatica_instance_name }}
acumatica_website: Default Web Site
acumatica_website_root: C:\inetpub\wwwroot # its physical root (root-redirect web.config)

# Tenant preloaded into the new database: '' = clean template, or SalesDemo.
acumatica_tenant_type: ''

# ac.exe deploys over Windows auth (Administrator is sysadmin); the site's
# runtime connection uses SQL auth with the sa password the acumatica_mssql role
# generated on kronos (dev/test lab — good enough, and survives renames).
acumatica_ac_exe: C:\Program Files\Acumatica ERP\Data\ac.exe

# IIS + ASP.NET 4.8; Web-Server pulls the default role services
# (static content, default doc, request filtering, ...).
acumatica_windows_features:
  - Web-Server
  - Web-Asp-Net45
  - Web-Dyn-Compression
  - Web-Http-Redirect # site root -> /{{ acumatica_instance_name }} redirect
  - Web-Mgmt-Console
