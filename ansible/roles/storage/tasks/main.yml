---
# VM disks are zvols under {{ vm_zvol_parent }} — cloning a golden
# VM is `zfs snapshot` + `zfs clone`, no data copy. Libvirt uses the raw
# /dev/zvol/... block devices directly; no libvirt storage pool required.

- name: Parent dataset for VM zvols
  community.general.zfs:
    name: "{{ vm_zvol_parent }}"
    state: present
    extra_zfs_properties:
      mountpoint: none

- name: Distr dataset (SMB-shared ISO images / installers)
  community.general.zfs:
    name: "{{ distr_dataset }}"
    state: present
    extra_zfs_properties:
      mountpoint: "{{ distr_mount }}"

- name: Parent dataset for backups
  community.general.zfs:
    name: upool/backups
    state: present
    extra_zfs_properties:
      mountpoint: none

- name: MSSQL backup dataset
  community.general.zfs:
    name: "{{ mssql_backup_dataset }}"
    state: present
    extra_zfs_properties:
      mountpoint: "{{ mssql_backup_mount }}"
      compression: zstd

- name: Install snapshot script
  ansible.builtin.copy:
    src: zfs-snap
    dest: /usr/local/sbin/zfs-snap
    mode: "0755"

- name: Remove the pre-rename snapshot script
  ansible.builtin.file:
    path: /usr/local/sbin/zfs-snap-backups
    state: absent

- name: Daily snapshot of MSSQL backup dataset
  ansible.builtin.copy:
    dest: /etc/cron.d/zfs-snap-mssql-backups
    mode: "0644"
    content: |
      15 3 * * * root /usr/local/sbin/zfs-snap {{ mssql_backup_dataset }} {{ backup_snap_keep }}

# One atomic recursive snapshot of the VM-zvol parent covers every VM's OS and
# data (and backup) zvol at the same txg, and auto-includes new VMs. This is a
# crash-consistent whole-VM rollback net (bad Windows Update, botched Acumatica
# upgrade); the SQL Agent .bak job remains the application-consistent DB backup.
- name: Daily recursive snapshot of VM zvols
  ansible.builtin.copy:
    dest: /etc/cron.d/zfs-snap-vms
    mode: "0644"
    content: |
      30 3 * * * root /usr/local/sbin/zfs-snap -r {{ vm_zvol_parent }} {{ vm_snap_keep }}
