---
# Guest block device that backs the PostgreSQL data filesystem. This is the
# second virtio disk (the -data zvol attached by linux_vm), so it enumerates
# as vdb.
postgresql_data_device: /dev/vdb

postgresql_remote_user: pilot
# On kronos, root-only — same idea as mssql_sa_password_file. Empty extra-var
# (default) loads from the file after generate-if-missing.
postgresql_remote_password_file: /root/mailpilot-pg-remote-{{ inventory_hostname }}.pass
postgresql_remote_password: ''
postgresql_readonly_user: reporter
postgresql_readonly_password_file: /root/mailpilot-pg-readonly-{{ inventory_hostname }}.pass
postgresql_readonly_password: ''

# Remote pg_hba allow — lab VM subnet (libvirt NAT / kronos gateway). Defaults
# to group_vars vm_subnet so a lab CIDR change does not require a role edit.
postgresql_hba_vm_subnet: "{{ vm_subnet }}"
