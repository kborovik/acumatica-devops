---
# Default snapshot manager on kronos: the packaged sanoid.timer fires every
# 15 minutes; sanoid takes/prunes snapshots per /etc/sanoid/sanoid.conf.
# Replaces the retired zfs-snap cron scheme (the host_storage role removes it).

- name: Install sanoid
  ansible.builtin.apt:
    package: ['sanoid']
    update_cache: true
    state: present

- name: Create sanoid configuration directory
  ansible.builtin.file:
    path: /etc/sanoid
    owner: root
    group: root
    mode: '0755'
    state: directory

- name: Deploy sanoid configuration
  ansible.builtin.template:
    src: sanoid.conf.j2
    dest: /etc/sanoid/sanoid.conf
    owner: root
    group: root
    mode: '0644'

# The packaged units pin TZ=UTC, which would shift daily_hour/daily_min away
# from the local-time backup timeline (and drift with DST). An empty
# Environment= in a drop-in resets the unit's environment to host local time.
- name: Drop-in directories for the sanoid units
  ansible.builtin.file:
    path: /etc/systemd/system/{{ item }}.d
    state: directory
    mode: '0755'
  loop: [sanoid.service, sanoid-prune.service]

- name: Run sanoid in host local time (clear the packaged TZ=UTC)
  ansible.builtin.copy:
    dest: /etc/systemd/system/{{ item }}.d/local-time.conf
    content: |
      [Service]
      Environment=
    mode: '0644'
  loop: [sanoid.service, sanoid-prune.service]
  notify: Reload systemd

- name: Enable sanoid snapshot timer
  ansible.builtin.systemd:
    name: sanoid.timer
    enabled: true
    state: started
